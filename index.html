<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-List</title>
</head>
<body>
    <div class="page-container"> 
        
        <aside class="sidebar">

            <header class="sidebar__brand">
                <div class="sidebar__brand-header">
                    <svg alt="User avatar" class="sidebar__user-img" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M234-276q51-39 114-61.5T480-360q69 0 132 22.5T726-276q35-41 54.5-93T800-480q0-133-93.5-226.5T480-800q-133 0-226.5 93.5T160-480q0 59 19.5 111t54.5 93Zm146.5-204.5Q340-521 340-580t40.5-99.5Q421-720 480-720t99.5 40.5Q620-639 620-580t-40.5 99.5Q539-440 480-440t-99.5-40.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm100-95.5q47-15.5 86-44.5-39-29-86-44.5T480-280q-53 0-100 15.5T294-220q39 29 86 44.5T480-160q53 0 100-15.5ZM523-537q17-17 17-43t-17-43q-17-17-43-17t-43 17q-17 17-17 43t17 43q17 17 43 17t43-17Zm-43-43Zm0 360Z"/></svg>
                    <span class="sidebar__user-name">John Doe</span>
                </div>
            </header>

            <nav class="sidebar__nav" aria-label="Sidebar Navigation">

                <section class="sidebar__section">

                    <div class="sidebar__header">
                        <h2>Filters</h2>
                    </div>

                    <ul class="sidebar__filter-list">
                        <li class="sidebar__filter-item">
                            <button id="todayState" class="sidebar__filter-button">
                            <svg class="sidebar__filter-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Zm0 0v-80 80Z"/></svg>                                <span class="sidebar__filter-label">Today</span>
                            </button>
                        </li>
                        <li class="sidebar__filter-item">
                            <button id="weekState" class="sidebar__filter-button">
                                <svg class="sidebar__filter-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M291.5-411.5Q280-423 280-440t11.5-28.5Q303-480 320-480t28.5 11.5Q360-457 360-440t-11.5 28.5Q337-400 320-400t-28.5-11.5Zm160 0Q440-423 440-440t11.5-28.5Q463-480 480-480t28.5 11.5Q520-457 520-440t-11.5 28.5Q497-400 480-400t-28.5-11.5Zm160 0Q600-423 600-440t11.5-28.5Q623-480 640-480t28.5 11.5Q680-457 680-440t-11.5 28.5Q657-400 640-400t-28.5-11.5ZM200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Zm0 0v-80 80Z"/></svg>
                                <span class="sidebar__filter-label">This week</span>
                            </button>
                        </li>
                        <li class="sidebar__filter-item">
                            <button id="allState" class="sidebar__filter-button">
                            <svg class="sidebar__filter-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M280-280v-400h400v400H280Zm80-80h240v-240H360v240ZM200-200v80q-33 0-56.5-23.5T120-200h80Zm-80-80v-80h80v80h-80Zm0-160v-80h80v80h-80Zm0-160v-80h80v80h-80Zm80-160h-80q0-33 23.5-56.5T200-840v80Zm80 640v-80h80v80h-80Zm0-640v-80h80v80h-80Zm160 640v-80h80v80h-80Zm0-640v-80h80v80h-80Zm160 640v-80h80v80h-80Zm0-640v-80h80v80h-80Zm160 640v-80h80q0 33-23.5 56.5T760-120Zm0-160v-80h80v80h-80Zm0-160v-80h80v80h-80Zm0-160v-80h80v80h-80Zm0-160v-80q33 0 56.5 23.5T840-760h-80Z"/></svg>                                <span class="sidebar__filter-label">All Tasks</span>
                            </button>
                        </li>
                    </ul>
                    
                </section>

                <section class="sidebar__section">
                    <div class="sidebar__header">
                        <h2>Projects</h2>
                        <button class="sidebar__btn-add-project" id="btn-open-project-modal" aria-label="Create new project">
                            <span class="sidebar__btn-icon" aria-hidden="true">+</span>
                        </button>
                    </div>
                    
                    <ul class="sidebar__project-list" id="projects-list">
                    </ul>
                </section>
                
            </nav>

            <footer class="sidebar__links"></footer>

        </aside>

        <main class="main">

            <header class="toolbar">
                <div class="toolbar__header">
                    <h1 class="toolbar__title">My Tasks</h1>
                </div>
                <div class="toolbar__actions">
                    <button id="btn-open-task-modal" class="toolbar__btn-add">Add New Task</button>
                </div>
            </header>

            <section class="task-board">

                <section class="task-board__column" id="column-todo" aria-labelledby="todo-heading" data-status="todo">
                    <header class="task-board__column-header">
                        <div class="task-board__column-info">
                            <h2 id="todo-heading" class="task-board__column-title">To Do</h2>
                            <span class="task-board__column-count">0</span>
                        </div>
                    </header>
                    
                    <ul class="task-board__list" id="todo_ul_list">
                    </ul>
                </section>

                <section class="task-board__column" id="column-progress" aria-labelledby="progress-heading" data-status="progress">
                    <header class="task-board__column-header">
                        <div class="task-board__column-info">
                            <h2 id="progress-heading" class="task-board__column-title">In Progress</h2>
                            <span class="task-board__column-count">0</span>
                        </div>
                    </header>
                    
                    <ul class="task-board__list" id="progress_ul_list">
                    </ul>
                </section>

                <section class="task-board__column" id="column-completed" aria-labelledby="completed-heading" data-status="completed">
                    <header class="task-board__column-header">
                        <div class="task-board__column-info">
                            <h2 id="completed-heading" class="task-board__column-title">Completed</h2>
                            <span class="task-board__column-count">0</span>
                        </div>
                    </header>
                    
                    <ul class="task-board__list" id="completed_ul_list"">
                    </ul>
                </section>

            </section>

        </main>

        <div class="modal" id="task-modal" role="dialog" aria-labelledby="modal-title" aria-hidden="true">
            <div class="modal__overlay" tabindex="-1"></div>
            
            <div class="modal__container">
                <header class="modal__header">
                    <h2 id="modal-title" class="modal__title">Create New Task</h2>
                    <button class="modal__close" id="btn-close-modal" aria-label="Close modal">×</button>
                </header>

                <form class="form-task" id="form-new-task" autocomplete="off">
                    
                    <div class="form-task__group">
                        <label for="task-title" class="form-task__label">Task Title *</label>
                        <input 
                            type="text" 
                            id="task-title" 
                            class="form-task__input" 
                            placeholder="e.g., Fix sidebar responsiveness" 
                            required
                        >
                    </div>

                    <div class="form-task__group">
                        <label for="task-desc" class="form-task__label">Description</label>
                        <textarea 
                            id="task-desc" 
                            class="form-task__textarea" 
                            placeholder="Provide some details about this task..."
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-task__row">
    
                        <div class="form-task__group">
                            <label for="task-date" class="form-task__label">Due Date</label>
                            <input 
                                type="date" 
                                id="task-date" 
                                class="form-task__input" 
                            >
                        </div>

                        <div class="form-task__group">
                            <label for="task-priority" class="form-task__label">Priority *</label>
                            <select id="task-priority" class="form-task__select" required>
                                <option value="" disabled selected>Select priority</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>

                        <div class="form-task__group">
                            <label for="task-project" class="form-task__label">Project *</label>
                            <select id="task-project" class="form-task__select" required>
                                <option value="" disabled selected>Select project</option>
                                <option value="personal">Personal</option>
                                <option value="work">Work</option>
                            </select>
                        </div>

                    </div>

                    <footer class="form-task__actions">
                        <button type="button" class="form-task__btn-cancel" id="btn-cancel-task">Cancel</button>
                        <button type="submit" class="form-task__btn-submit">Add Task</button>
                    </footer>

                </form>
            </div>
        </div>

        <div class="modal" id="project-modal" role="dialog" aria-labelledby="project-modal-title" aria-hidden="true">
            <div class="modal__overlay" tabindex="-1"></div>
            
            <div class="modal__container modal__container--small">
                <header class="modal__header">
                    <h2 id="project-modal-title" class="modal__title">Create New Project</h2>
                    <button class="modal__close" id="btn-close-project-modal" aria-label="Close modal">×</button>
                </header>

                <form class="form-task" id="form-new-project" autocomplete="off">
                    
                    <div class="form-task__group">
                        <label for="project-name" class="form-task__label">Project Name *</label>
                        <input 
                            type="text" 
                            id="project-name" 
                            class="form-task__input" 
                            placeholder="e.g., Freelance, Home Reforms..." 
                            required
                        >
                    </div>

                    <div class="form-task__group">
                        <label for="project-color" class="form-task__label">Project Color</label>
                        <div class="form-task__color-picker-wrapper">
                            <input 
                                type="color" 
                                id="project-color" 
                                class="form-task__color-input" 
                                value="#3b82f6"
                            >
                            <span class="form-task__color-help">This color will represent the project in your sidebar and tasks.</span>
                        </div>
                    </div>

                    <footer class="form-task__actions">
                        <button type="button" class="form-task__btn-cancel" id="btn-cancel-project">Cancel</button>
                        <button type="submit" class="form-task__btn-submit">Create Project</button>
                    </footer>

                </form>
            </div>
        </div>
        
    </div>
</body>
</html>
